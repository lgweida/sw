[default]
ConnectionType=initiator
ReconnectInterval=5
HeartBtInt=30
StartTime=00:00:00
EndTime=23:59:59
UseDataDictionary=Y
ValidateUserDefinedFields=N
ValidateFieldsOutOfOrder=N
ValidateFieldsHaveValues=N
ValidateIncomingMessage=N
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y
FileStorePath=target/data/fix
FileLogPath=target/logs/fix

# ---------------------------------------------------------------------------
# BANZAI (dev/test session — no network routing)
# ---------------------------------------------------------------------------
[session]
BeginString=FIX.4.2
SenderCompID=BANZAI
TargetCompID=EXEC
SocketConnectHost=localhost
SocketConnectPort=9876
DataDictionary=FIX42.xml
Network=NONE
BrokerCode=NONE

