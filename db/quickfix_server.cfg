[default]
ConnectionType=acceptor
ReconnectInterval=5
HeartBtInt=30
StartTime=00:00:00
EndTime=23:59:59
UseDataDictionary=Y
ValidateUserDefinedFields=N
ValidateFieldsOutOfOrder=N
ValidateFieldsHaveValues=N
ValidateIncomingMessage=N
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y
FileStorePath=target/data/fix
FileLogPath=target/logs/fix

